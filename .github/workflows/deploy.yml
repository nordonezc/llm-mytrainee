name: Sync to Hugging Face Spaces
on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://noc-95:$HF_TOKEN@huggingface.co/spaces/noc-95/llm_mytrainee
          git push --force hf HEAD:main